<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Tiger Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        /* === FULLSCREEN IFRAME === */
        #siteFrame {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            border: none; z-index: 1;
        }

        /* === FLOATING TOOL CART === */
        .tool-cart {
            position: fixed;
            bottom: 80px; right: 10px;
            width: 280px;
            background: #1a1a2e;
            border: 1.5px solid #6c63ff;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(108,99,255,0.35);
            z-index: 99999;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            color: #fff;
        }
        .tool-cart.minimized {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            bottom: 90px; right: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(108,99,255,0.5);
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 20px rgba(108,99,255,0.5); }
            50% { box-shadow: 0 4px 30px rgba(108,99,255,0.8); }
        }
        .tool-cart.minimized .cart-content,
        .tool-cart.minimized .cart-footer { display: none; }
        .tool-cart.minimized .cart-head { 
            padding: 0; background: none; border: none;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .tool-cart.minimized .cart-head .head-title,
        .tool-cart.minimized .cart-head .head-btns .min-btn { display: none; }
        .tool-cart.minimized .cart-head .head-btns { margin: 0; }
        .tool-cart.minimized .mini-icon { display: flex; font-size: 22px; }

        /* Cart Header */
        .cart-head {
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: grab;
            user-select: none;
        }
        .cart-head:active { cursor: grabbing; }
        .head-title { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
        .head-btns { display: flex; gap: 6px; align-items: center; }
        .head-btns button {
            background: rgba(255,255,255,0.2);
            border: none; color: #fff;
            width: 24px; height: 24px;
            border-radius: 6px; cursor: pointer;
            font-size: 14px; display: flex;
            align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .head-btns button:hover { background: rgba(255,255,255,0.35); }
        .mini-icon { display: none; font-size: 22px; }

        /* Cart Content */
        .cart-content {
            padding: 10px 12px;
            max-height: 320px;
            overflow-y: auto;
        }
        .cart-content::-webkit-scrollbar { width: 3px; }
        .cart-content::-webkit-scrollbar-thumb { background: #6c63ff; border-radius: 3px; }

        /* Status Box */
        .status-box {
            background: rgba(108,99,255,0.08);
            border: 1px solid rgba(108,99,255,0.25);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 12px;
            line-height: 1.4;
            color: #ccc;
        }
        .status-box .green { color: #00e676; font-weight: 600; }
        .status-box .orange { color: #ffab40; font-weight: 600; }
        .status-box .purple { color: #b388ff; font-weight: 600; }

        /* Trend Section */
        .trend-sec { display: none; }
        .trend-sec.show { display: block; }
        .trend-counter { text-align: center; font-size: 11px; color: #888; margin-bottom: 6px; }
        .trend-counter b { color: #6c63ff; font-size: 14px; }

        .trend-row { display: flex; gap: 6px; margin-bottom: 8px; }
        .trend-row select {
            flex: 1; padding: 6px 8px;
            background: #16213e; border: 1px solid #333;
            color: #fff; border-radius: 6px; font-size: 11px;
        }

        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn-d, .btn-t {
            flex: 1; padding: 10px 0;
            border: none; border-radius: 8px;
            font-size: 12px; font-weight: 700;
            cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            text-transform: uppercase;
        }
        .btn-d {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: #fff;
        }
        .btn-t {
            background: linear-gradient(135deg, #ffd93d, #f39c12);
            color: #1a1a2e;
        }
        .btn-d:active, .btn-t:active { transform: scale(0.95); }

        /* Tags */
        .tags-area {
            display: flex; flex-wrap: wrap; gap: 4px;
            padding: 6px; background: rgba(0,0,0,0.3);
            border-radius: 6px; min-height: 28px; margin-bottom: 6px;
        }
        .tag {
            padding: 2px 7px; border-radius: 4px;
            font-size: 9px; font-weight: 700; text-transform: uppercase;
        }
        .tag.d { background: rgba(255,107,107,0.2); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.3); }
        .tag.t { background: rgba(255,217,61,0.2); color: #ffd93d; border: 1px solid rgba(255,217,61,0.3); }

        .rst-btn {
            display: none; margin: 4px auto 0; padding: 5px 14px;
            background: rgba(108,99,255,0.15); border: 1px solid rgba(108,99,255,0.3);
            color: #aaa; border-radius: 5px; font-size: 10px; cursor: pointer;
        }

        /* Processing */
        .processing { display: none; text-align: center; padding: 12px 0; }
        .processing.show { display: block; }
        .spinner {
            width: 28px; height: 28px; margin: 0 auto 8px;
            border: 3px solid rgba(108,99,255,0.2);
            border-top: 3px solid #6c63ff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .processing p { font-size: 11px; color: #888; }

        /* Result */
        .result-sec { display: none; text-align: center; padding: 8px 0; }
        .result-sec.show { display: block; }
        .result-sec h4 { font-size: 11px; color: #888; margin-bottom: 4px; }
        .result-val {
            font-size: 22px; font-weight: 800; margin-bottom: 8px;
            text-transform: uppercase;
        }
        .result-val.dragon { color: #ff6b6b; }
        .result-val.tiger { color: #ffd93d; }
        .result-sec .ask { font-size: 11px; color: #888; margin-bottom: 6px; }
        .fb-row { display: flex; gap: 8px; justify-content: center; }
        .fb-row button {
            padding: 7px 18px; border: none; border-radius: 6px;
            font-size: 12px; font-weight: 600; cursor: pointer;
        }
        .fb-y { background: #00e676; color: #1a1a2e; }
        .fb-n { background: #ff5252; color: #fff; }

        /* Footer Nav */
        .cart-footer {
            padding: 8px 10px;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(108,99,255,0.15);
        }
        .nav-row { display: flex; gap: 5px; }
        .nav-row button {
            flex: 1; padding: 7px 4px;
            background: rgba(108,99,255,0.1);
            border: 1px solid rgba(108,99,255,0.3);
            color: #bbb; border-radius: 6px;
            font-size: 10px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .nav-row button.on {
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            border-color: #6c63ff; color: #fff;
        }
        .nav-row button:hover { border-color: #6c63ff; color: #fff; }
    </style>
</head>
<body>

<!-- Fullscreen Website -->
<iframe id="siteFrame" src="https://dhaniwin0.com/login?type=0" 
    allow="fullscreen"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
    referrerpolicy="no-referrer"></iframe>

<!-- Small Floating Tool Cart -->
<div class="tool-cart" id="cart">
    <div class="cart-head" id="cartHead">
        <span class="head-title">🎯 DT Predictor</span>
        <span class="mini-icon">🎯</span>
        <div class="head-btns">
            <button class="min-btn" onclick="toggleMinimize()" title="Minimize">−</button>
        </div>
    </div>
    <div class="cart-content">
        <div class="status-box" id="statusBox">Login Now, Tool is waiting...</div>

        <div class="trend-sec" id="trendSec">
            <div class="trend-counter">Entered: <b id="cnt">0</b>/10</div>
            <div class="trend-row">
                <select id="tNum">
                    <option>Trend 1</option><option>Trend 2</option>
                    <option>Trend 3</option><option>Trend 4</option><option>Trend 5</option>
                </select>
            </div>
            <div class="btn-row">
                <button class="btn-d" onclick="addT('DRAGON')">🔥 Dragon</button>
                <button class="btn-t" onclick="addT('TIGER')">🐯 Tiger</button>
            </div>
            <div class="tags-area" id="tags"></div>
            <button class="rst-btn" id="rstBtn" onclick="resetT()">↺ Reset</button>
        </div>

        <div class="processing" id="proc">
            <div class="spinner"></div>
            <p>Analyzing patterns...</p>
        </div>

        <div class="result-sec" id="resSec">
            <h4>Next Result:</h4>
            <div class="result-val" id="resVal"></div>
            <p class="ask">Tell me, is it right?</p>
            <div class="fb-row">
                <button class="fb-y" onclick="fbYes()">✅ Yes</button>
                <button class="fb-n" onclick="fbNo()">❌ No</button>
            </div>
        </div>
    </div>

    <div class="cart-footer">
        <div class="nav-row">
            <button class="on" id="nLogin" onclick="nav('login')">🔑 Login</button>
            <button id="nHome" onclick="nav('home')">🏠 Home</button>
            <button id="nDT" onclick="nav('dt')">🎲 D&T</button>
        </div>
    </div>
</div>

<script>
// === MINIMIZE / MAXIMIZE ===
const cart = document.getElementById('cart');
let isMin = false;

function toggleMinimize() {
    isMin = !isMin;
    cart.classList.toggle('minimized', isMin);
}
// Click minimized bubble to expand
cart.addEventListener('click', function(e) {
    if (isMin) { toggleMinimize(); e.stopPropagation(); }
});

// === DRAG ===
const head = document.getElementById('cartHead');
let dragging = false, dx = 0, dy = 0, startX, startY;

head.addEventListener('mousedown', dStart);
head.addEventListener('touchstart', dStart, {passive: false});
document.addEventListener('mousemove', dMove);
document.addEventListener('touchmove', dMove, {passive: false});
document.addEventListener('mouseup', dEnd);
document.addEventListener('touchend', dEnd);

function dStart(e) {
    if (isMin) return;
    dragging = true;
    let ev = e.touches ? e.touches[0] : e;
    startX = ev.clientX - dx;
    startY = ev.clientY - dy;
    cart.style.transition = 'none';
}
function dMove(e) {
    if (!dragging) return;
    e.preventDefault();
    let ev = e.touches ? e.touches[0] : e;
    dx = ev.clientX - startX;
    dy = ev.clientY - startY;
    cart.style.transform = `translate(${dx}px, ${dy}px)`;
}
function dEnd() { dragging = false; cart.style.transition = 'all 0.3s cubic-bezier(0.4,0,0.2,1)'; }

// === NAVIGATION ===
const urls = {
    login: 'https://dhaniwin0.com/login?type=0',
    home: 'https://dhaniwin0.com/',
    dt: 'https://dhaniwin0.com/game/allGames?categoryCode=C202505220412050186'
};
const frame = document.getElementById('siteFrame');

function nav(p) {
    frame.src = urls[p];
    document.querySelectorAll('.nav-row button').forEach(b => b.classList.remove('on'));
    if (p === 'login') { document.getElementById('nLogin').classList.add('on'); setStatus('Login Now, Tool is waiting...'); hideTrend(); hideRes(); }
    if (p === 'home') { document.getElementById('nHome').classList.add('on'); setStatus('<span class="green">Login Done!</span> Now use Dragon Tiger.'); hideTrend(); hideRes(); }
    if (p === 'dt') { document.getElementById('nDT').classList.add('on'); setStatus('Select last <span class="purple">10 trends</span> (Bottom to top).'); showTrend(); hideRes(); }
}

function setStatus(m) { document.getElementById('statusBox').innerHTML = m; }
function showTrend() { document.getElementById('trendSec').classList.add('show'); }
function hideTrend() { document.getElementById('trendSec').classList.remove('show'); }
function hideRes() { document.getElementById('resSec').classList.remove('show'); document.getElementById('proc').classList.remove('show'); }

// === TREND INPUT ===
let trends = [];
let history = JSON.parse(localStorage.getItem('dt_hist') || '[]');

function addT(v) {
    if (trends.length >= 10) return;
    trends.push(v);
    document.getElementById('cnt').textContent = trends.length;
    let tag = document.createElement('span');
    tag.className = 'tag ' + (v === 'DRAGON' ? 'd' : 't');
    tag.textContent = v === 'DRAGON' ? 'D' : 'T';
    document.getElementById('tags').appendChild(tag);
    document.getElementById('rstBtn').style.display = 'block';
    setStatus(`Trend <span class="purple">${trends.length}/10</span> entered...`);
    if (trends.length >= 10) analyze();
}

function resetT() {
    trends = [];
    document.getElementById('cnt').textContent = '0';
    document.getElementById('tags').innerHTML = '';
    document.getElementById('rstBtn').style.display = 'none';
    hideRes();
    setStatus('Select last <span class="purple">10 trends</span> (Bottom to top).');
}

// === ANALYSIS ===
function analyze() {
    hideTrend();
    document.getElementById('proc').classList.add('show');
    setStatus('<span class="purple">Processing...</span> Triple analysis running...');

    const data = { trends: trends, trendNumber: document.getElementById('tNum').selectedIndex + 1 };

    fetch('get-data.php', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(r => r.json())
    .then(() => Promise.all([
        fetch('First-time-trend-anylyse.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }).then(r=>r.json()),
        fetch('Second-time-anylyse.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }).then(r=>r.json()),
        fetch('Third-time-anylyse.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) }).then(r=>r.json())
    ]))
    .then(res => fetch('Master-prediction-tool.php', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ first:res[0], second:res[1], third:res[2], trends:trends, trendNumber: data.trendNumber }) }).then(r=>r.json()))
    .then(f => showResult(f.prediction))
    .catch(() => { setTimeout(() => showResult(localPredict(trends)), 1500); });
}

// === LOCAL PREDICTION (FALLBACK) ===
function localPredict(d) {
    let votes = { DRAGON: 0, TIGER: 0 };

    // Markov
    if (d.length >= 2) {
        let last = d[d.length-1];
        let tr = { DRAGON:{DRAGON:0,TIGER:0}, TIGER:{DRAGON:0,TIGER:0} };
        for (let i=0;i<d.length-1;i++) tr[d[i]][d[i+1]]++;
        let f = tr[last];
        votes[f.DRAGON >= f.TIGER ? 'DRAGON' : 'TIGER'] += 3;
    }

    // Streak
    let last = d[d.length-1], streak = 1;
    for (let i=d.length-2;i>=0;i--) { if(d[i]===last) streak++; else break; }
    if (streak <= 2) votes[last] += 2;
    else if (streak >= 4) votes[last==='DRAGON'?'TIGER':'DRAGON'] += 2;
    else votes[last==='DRAGON'?'TIGER':'DRAGON'] += 1;

    // Pattern (2-gram)
    if (d.length >= 4) {
        let p = d[d.length-2]+d[d.length-1], nD=0, nT=0;
        for (let i=0;i<d.length-2;i++) { if(d[i]+d[i+1]===p && i+2<d.length){ if(d[i+2]==='DRAGON') nD++; else nT++; }}
        if (nD+nT>0) votes[nD>=nT?'DRAGON':'TIGER'] += 2;
    }

    // Recent bias
    let r5 = d.slice(-5), dc = r5.filter(x=>x==='DRAGON').length;
    if (dc >= 4) votes['TIGER'] += 1;
    else if (dc <= 1) votes['DRAGON'] += 1;

    // History learning
    let pat = d.slice(-3).join(','), hD=0, hT=0;
    for (let h of history) { if(h.p===pat){ if(h.a==='DRAGON') hD++; else hT++; }}
    if (hD+hT>0) votes[hD>=hT?'DRAGON':'TIGER'] += 2;

    return votes.DRAGON >= votes.TIGER ? 'DRAGON' : 'TIGER';
}

// === SHOW RESULT ===
function showResult(pred) {
    document.getElementById('proc').classList.remove('show');
    document.getElementById('resSec').classList.add('show');
    let el = document.getElementById('resVal');
    el.textContent = pred;
    el.className = 'result-val ' + pred.toLowerCase();
    setStatus('<span class="green">Done!</span> Next result ready.');
    window._pred = pred;
    window._pat = trends.slice(-3).join(',');
}

// === FEEDBACK ===
function fbYes() {
    history.push({ p: window._pat, a: window._pred });
    if (history.length > 100) history.shift();
    localStorage.setItem('dt_hist', JSON.stringify(history));
    setStatus('<span class="green">Great! ✅</span> Enter 10 new trends.');
    resetForNew();
}
function fbNo() {
    let opp = window._pred === 'DRAGON' ? 'TIGER' : 'DRAGON';
    history.push({ p: window._pat, a: opp });
    if (history.length > 100) history.shift();
    localStorage.setItem('dt_hist', JSON.stringify(history));
    setStatus('<span class="orange">Again enter trends, 99% result my promise.</span>');
    resetForNew();
}
function resetForNew() {
    trends = [];
    document.getElementById('cnt').textContent = '0';
    document.getElementById('tags').innerHTML = '';
    document.getElementById('resSec').classList.remove('show');
    document.getElementById('rstBtn').style.display = 'none';
    setTimeout(() => showTrend(), 800);
}
</script>
</body>
</html>
