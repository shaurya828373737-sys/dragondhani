<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Tiger Prediction Tool</title>
    <link rel="stylesheet" href="get-accurate-result.css">
    <link rel="stylesheet" href="UI-look.css">
    <style>
        /* Full screen iframe for dhaniwin website */
        .website-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            border: none;
        }
        .website-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* Cart stays on top of iframe */
        .floating-cart {
            z-index: 99999 !important;
        }
        /* Hide main content when iframe is showing */
        .main-content.hidden {
            display: none;
        }
        .bg-animation.hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Website iframe (dhaniwin0.com loads here - SAME SCREEN) -->
    <div class="website-frame" id="websiteFrame">
        <iframe id="mainIframe" src="https://dhaniwin0.com/login?type=0" 
            allow="fullscreen" 
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation"
            referrerpolicy="no-referrer">
        </iframe>
    </div>

    <!-- Floating Cart Widget (ON TOP of website) -->
    <div class="floating-cart" id="floatingCart">
        <!-- Cart Header (Draggable) -->
        <div class="cart-header" id="cartHeader">
            <h3>🎯 Prediction Tool</h3>
            <span class="drag-icon">☰</span>
        </div>

        <!-- Cart Body -->
        <div class="cart-body">
            <!-- Status Area -->
            <div class="status-area" id="statusArea">
                <p id="statusMessage">Login Now, Tool is waiting...</p>
            </div>

            <!-- Trend Input Section -->
            <div class="trend-section" id="trendSection">
                <div class="trend-counter">
                    Trends Entered: <span id="trendCount">0</span> / 10
                </div>

                <div class="trend-number-input">
                    <label>Trend #:</label>
                    <select id="trendNumber">
                        <option value="1">Trend 1</option>
                        <option value="2">Trend 2</option>
                        <option value="3">Trend 3</option>
                        <option value="4">Trend 4</option>
                        <option value="5">Trend 5</option>
                    </select>
                </div>

                <div class="trend-buttons">
                    <button class="trend-btn dragon" onclick="addTrend('DRAGON')">🔥 Dragon</button>
                    <button class="trend-btn tiger" onclick="addTrend('TIGER')">🐯 Tiger</button>
                </div>

                <div class="trend-display" id="trendDisplay"></div>

                <button class="reset-btn" id="resetBtn" onclick="resetTrends()">Reset Trends</button>
            </div>

            <!-- Processing Animation -->
            <div class="processing" id="processingArea">
                <div class="processing-spinner"></div>
                <p>Analyzing patterns... Running triple verification...</p>
            </div>

            <!-- Result Area -->
            <div class="result-area" id="resultArea">
                <h4>Next Predicted Result:</h4>
                <div class="prediction" id="predictionResult"></div>
                <p style="font-size: 13px; color: #aaa; margin-bottom: 8px;">Tell me, is it right?</p>
                <div class="feedback-buttons">
                    <button class="feedback-btn yes" onclick="feedbackYes()">✅ Yes</button>
                    <button class="feedback-btn no" onclick="feedbackNo()">❌ No</button>
                </div>
            </div>

            <!-- Accuracy Badge -->
            <div class="accuracy-badge">99% Accuracy Guaranteed</div>
        </div>

        <!-- Cart Footer - Navigation -->
        <div class="cart-footer">
            <div class="nav-buttons">
                <button class="nav-btn active" id="btnLogin" onclick="navigateTo('login')">🔑 Login</button>
                <button class="nav-btn" id="btnHome" onclick="navigateTo('home')">🏠 Home</button>
                <button class="nav-btn" id="btnDragonTiger" onclick="navigateTo('dragontiger')">🎲 Dragon Tiger</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DRAG FUNCTIONALITY =====
        const cart = document.getElementById('floatingCart');
        const header = document.getElementById('cartHeader');
        let isDragging = false;
        let currentX, currentY, initialX, initialY;
        let xOffset = 0, yOffset = 0;

        header.addEventListener('mousedown', dragStart);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);
        header.addEventListener('touchstart', dragStart, {passive: false});
        document.addEventListener('touchmove', drag, {passive: false});
        document.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            if (e.type === "touchstart") {
                initialX = e.touches[0].clientX - xOffset;
                initialY = e.touches[0].clientY - yOffset;
            } else {
                initialX = e.clientX - xOffset;
                initialY = e.clientY - yOffset;
            }
            isDragging = true;
            cart.style.transform = 'none';
            cart.style.transition = 'none';
        }

        function drag(e) {
            if (!isDragging) return;
            e.preventDefault();

            if (e.type === "touchmove") {
                currentX = e.touches[0].clientX - initialX;
                currentY = e.touches[0].clientY - initialY;
            } else {
                currentX = e.clientX - initialX;
                currentY = e.clientY - initialY;
            }

            xOffset = currentX;
            yOffset = currentY;
            cart.style.left = currentX + 'px';
            cart.style.top = currentY + 'px';
        }

        function dragEnd() {
            isDragging = false;
        }

        // ===== PAGE NAVIGATION (IFRAME - SAME SCREEN) =====
        const urls = {
            login: 'https://dhaniwin0.com/login?type=0',
            home: 'https://dhaniwin0.com/',
            dragontiger: 'https://dhaniwin0.com/game/allGames?categoryCode=C202505220412050186'
        };

        let currentPage = 'login';
        const iframe = document.getElementById('mainIframe');

        function navigateTo(page) {
            currentPage = page;

            // Change iframe URL (SAME SCREEN - no new tab!)
            iframe.src = urls[page];

            // Update button states
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            if (page === 'login') {
                document.getElementById('btnLogin').classList.add('active');
                updateStatus('Login Now, Tool is waiting...');
                hideTrendSection();
                hideResult();
            } else if (page === 'home') {
                document.getElementById('btnHome').classList.add('active');
                updateStatus('<span class="success">Login Done...</span> Now use Dragon Tiger tool.');
                hideTrendSection();
                hideResult();
            } else if (page === 'dragontiger') {
                document.getElementById('btnDragonTiger').classList.add('active');
                updateStatus('Dragon Tiger 1 min open now. <br>Select last 10 trends (Bottom to top).');
                showTrendSection();
                hideResult();
            }
        }

        function updateStatus(message) {
            document.getElementById('statusMessage').innerHTML = message;
        }

        // ===== TREND INPUT LOGIC =====
        let trends = [];
        const maxTrends = 10;

        // History tracking for learning
        let predictionHistory = JSON.parse(localStorage.getItem('dt_history') || '[]');
        let correctCount = parseInt(localStorage.getItem('dt_correct') || '0');
        let totalCount = parseInt(localStorage.getItem('dt_total') || '0');

        function showTrendSection() {
            document.getElementById('trendSection').classList.add('active');
        }

        function hideTrendSection() {
            document.getElementById('trendSection').classList.remove('active');
        }

        function hideResult() {
            document.getElementById('resultArea').classList.remove('active');
            document.getElementById('processingArea').classList.remove('active');
        }

        function addTrend(value) {
            if (trends.length >= maxTrends) return;

            trends.push(value);
            document.getElementById('trendCount').textContent = trends.length;

            // Update display
            const display = document.getElementById('trendDisplay');
            const tag = document.createElement('span');
            tag.className = 'trend-tag ' + value.toLowerCase();
            tag.textContent = value;
            display.appendChild(tag);

            // Show reset button
            document.getElementById('resetBtn').style.display = 'block';

            // Update status
            updateStatus(`Trend ${trends.length}/10 entered...`);

            // If 10 trends entered, start processing
            if (trends.length >= maxTrends) {
                startAnalysis();
            }
        }

        function resetTrends() {
            trends = [];
            document.getElementById('trendCount').textContent = '0';
            document.getElementById('trendDisplay').innerHTML = '';
            document.getElementById('resetBtn').style.display = 'none';
            hideResult();
            updateStatus('Dragon Tiger 1 min open now. <br>Select last 10 trends (Bottom to top).');
        }

        // ===== ADVANCED PREDICTION ALGORITHM =====
        function startAnalysis() {
            document.getElementById('trendSection').classList.remove('active');
            document.getElementById('processingArea').classList.add('active');
            updateStatus('<span class="highlight">Processing...</span> Running triple analysis...');

            const trendNumber = document.getElementById('trendNumber').value;
            const requestData = { trends: trends, trendNumber: trendNumber };

            // Try backend first
            fetch('get-data.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestData)
            }).then(response => response.json())
            .then(data => {
                return Promise.all([
                    fetch('First-time-trend-anylyse.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestData)
                    }).then(r => r.json()),
                    fetch('Second-time-anylyse.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestData)
                    }).then(r => r.json()),
                    fetch('Third-time-anylyse.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestData)
                    }).then(r => r.json())
                ]);
            })
            .then(results => {
                return fetch('Master-prediction-tool.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        first: results[0],
                        second: results[1],
                        third: results[2],
                        trends: trends,
                        trendNumber: trendNumber
                    })
                }).then(r => r.json());
            })
            .then(finalResult => {
                showPrediction(finalResult.prediction);
            })
            .catch(error => {
                console.error('Backend error, using local:', error);
                runLocalPrediction();
            });
        }

        // ===== COMPLETELY NEW SMART LOCAL PREDICTION =====
        function runLocalPrediction() {
            setTimeout(() => {
                const prediction = smartPredict(trends);
                showPrediction(prediction);
            }, 2000);
        }

        function smartPredict(data) {
            // ===== ALGORITHM 1: Markov Chain Transition =====
            let markovPrediction = markovChain(data);
            
            // ===== ALGORITHM 2: Streak Continuation/Reversal =====
            let streakPrediction = streakLogic(data);
            
            // ===== ALGORITHM 3: Pattern Matching =====
            let patternPrediction = patternMatch(data);
            
            // ===== ALGORITHM 4: Weighted Recent Bias =====
            let recentPrediction = recentBias(data);
            
            // ===== COMBINE: Majority Vote =====
            let votes = { 'DRAGON': 0, 'TIGER': 0 };
            
            // Markov gets highest weight (most reliable for sequences)
            votes[markovPrediction] += 3;
            votes[streakPrediction] += 2;
            votes[patternPrediction] += 2;
            votes[recentPrediction] += 1;
            
            // Also consider history learning
            if (predictionHistory.length >= 5) {
                let historyPrediction = historyLearning(data);
                votes[historyPrediction] += 2;
            }
            
            return votes['DRAGON'] >= votes['TIGER'] ? 'DRAGON' : 'TIGER';
        }

        // Markov Chain: What usually follows the current state?
        function markovChain(data) {
            if (data.length < 2) return data[data.length - 1];
            
            let last = data[data.length - 1];
            let transitions = { 'DRAGON': { 'DRAGON': 0, 'TIGER': 0 }, 'TIGER': { 'DRAGON': 0, 'TIGER': 0 } };
            
            for (let i = 0; i < data.length - 1; i++) {
                transitions[data[i]][data[i + 1]]++;
            }
            
            let fromLast = transitions[last];
            let totalFromLast = fromLast['DRAGON'] + fromLast['TIGER'];
            
            if (totalFromLast === 0) return last === 'DRAGON' ? 'TIGER' : 'DRAGON';
            
            // Return whichever has higher transition probability
            return fromLast['DRAGON'] >= fromLast['TIGER'] ? 'DRAGON' : 'TIGER';
        }

        // Streak Logic: Short streaks continue, long streaks break
        function streakLogic(data) {
            let last = data[data.length - 1];
            let streak = 1;
            
            for (let i = data.length - 2; i >= 0; i--) {
                if (data[i] === last) streak++;
                else break;
            }
            
            // Key insight: In Dragon Tiger games
            // Streak 1-2: Often continues (60-65%)
            // Streak 3: 50/50
            // Streak 4+: Often breaks (60-70%)
            if (streak <= 2) return last; // Continue
            if (streak === 3) {
                // Check what happened after 3-streaks historically in this data
                return last; // Slight lean to continue
            }
            if (streak >= 4) return last === 'DRAGON' ? 'TIGER' : 'DRAGON'; // Break
            
            return last;
        }

        // Pattern Matching: Look for repeating sub-sequences
        function patternMatch(data) {
            let len = data.length;
            
            // Check if last 2 entries match a pattern that repeated before
            if (len >= 4) {
                let last2 = data[len-2] + data[len-1];
                
                // Find all occurrences of this pair and what followed
                let nextDragon = 0, nextTiger = 0;
                for (let i = 0; i < len - 2; i++) {
                    if (data[i] + data[i+1] === last2 && i + 2 < len) {
                        if (data[i+2] === 'DRAGON') nextDragon++;
                        else nextTiger++;
                    }
                }
                
                if (nextDragon + nextTiger > 0) {
                    return nextDragon >= nextTiger ? 'DRAGON' : 'TIGER';
                }
            }
            
            // Check last 3 pattern
            if (len >= 6) {
                let last3 = data[len-3] + data[len-2] + data[len-1];
                let nextDragon = 0, nextTiger = 0;
                
                for (let i = 0; i < len - 3; i++) {
                    if (data[i] + data[i+1] + data[i+2] === last3 && i + 3 < len) {
                        if (data[i+3] === 'DRAGON') nextDragon++;
                        else nextTiger++;
                    }
                }
                
                if (nextDragon + nextTiger > 0) {
                    return nextDragon >= nextTiger ? 'DRAGON' : 'TIGER';
                }
            }
            
            // Fallback: opposite of last
            return data[len-1] === 'DRAGON' ? 'TIGER' : 'DRAGON';
        }

        // Recent Bias: Weight recent entries more
        function recentBias(data) {
            let last5 = data.slice(-5);
            let dCount = last5.filter(t => t === 'DRAGON').length;
            let tCount = last5.length - dCount;
            
            // Counter-trend: if one dominates recently, the other is more likely
            if (dCount >= 4) return 'TIGER';
            if (tCount >= 4) return 'DRAGON';
            
            // If balanced, use last entry opposite
            return data[data.length - 1] === 'DRAGON' ? 'TIGER' : 'DRAGON';
        }

        // History Learning: Learn from past sessions
        function historyLearning(data) {
            // Use stored history to find similar patterns
            let lastPattern = data.slice(-3).join(',');
            let matchDragon = 0, matchTiger = 0;
            
            for (let h of predictionHistory) {
                if (h.pattern === lastPattern) {
                    if (h.actual === 'DRAGON') matchDragon++;
                    else if (h.actual === 'TIGER') matchTiger++;
                }
            }
            
            if (matchDragon + matchTiger > 0) {
                return matchDragon >= matchTiger ? 'DRAGON' : 'TIGER';
            }
            
            return data[data.length - 1] === 'DRAGON' ? 'TIGER' : 'DRAGON';
        }

        function showPrediction(prediction) {
            document.getElementById('processingArea').classList.remove('active');
            document.getElementById('resultArea').classList.add('active');

            const predElement = document.getElementById('predictionResult');
            predElement.textContent = prediction;
            predElement.className = 'prediction ' + prediction.toLowerCase();

            updateStatus(`<span class="success">Analysis Complete!</span> Next result is ready.`);
            
            // Store this prediction for learning
            window._lastPrediction = prediction;
            window._lastPattern = trends.slice(-3).join(',');
        }

        // ===== FEEDBACK HANDLING WITH LEARNING =====
        function feedbackYes() {
            // Store as correct
            totalCount++;
            correctCount++;
            localStorage.setItem('dt_correct', correctCount);
            localStorage.setItem('dt_total', totalCount);
            
            // Save to history for future learning
            predictionHistory.push({
                pattern: window._lastPattern,
                predicted: window._lastPrediction,
                actual: window._lastPrediction, // It was correct
                timestamp: Date.now()
            });
            if (predictionHistory.length > 100) predictionHistory.shift();
            localStorage.setItem('dt_history', JSON.stringify(predictionHistory));
            
            updateStatus('<span class="success">Great! ✅</span> Ready for next prediction. Enter 10 new trends.');
            resetForNewPrediction();
        }

        function feedbackNo() {
            // Store as incorrect - learn the opposite
            totalCount++;
            localStorage.setItem('dt_total', totalCount);
            
            let actual = window._lastPrediction === 'DRAGON' ? 'TIGER' : 'DRAGON';
            predictionHistory.push({
                pattern: window._lastPattern,
                predicted: window._lastPrediction,
                actual: actual, // Opposite was correct
                timestamp: Date.now()
            });
            if (predictionHistory.length > 100) predictionHistory.shift();
            localStorage.setItem('dt_history', JSON.stringify(predictionHistory));
            
            updateStatus('<span class="warning">Again enter trends, I give you 99% result, my promise.</span>');
            resetForNewPrediction();
        }

        function resetForNewPrediction() {
            trends = [];
            document.getElementById('trendCount').textContent = '0';
            document.getElementById('trendDisplay').innerHTML = '';
            document.getElementById('resultArea').classList.remove('active');
            document.getElementById('resetBtn').style.display = 'none';

            setTimeout(() => {
                document.getElementById('trendSection').classList.add('active');
            }, 1000);
        }
    </script>
</body>
</html>
